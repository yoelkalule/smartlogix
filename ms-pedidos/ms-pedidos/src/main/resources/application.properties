spring.application.name=ms-pedidos
server.port=8082
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartlogix}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:smartlogix}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:smartlogix123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
notificaciones.url=${NOTIFICACIONES_URL:http://localhost:8084}
resilience4j.circuitbreaker.instances.notificaciones.sliding-window-size=5
resilience4j.circuitbreaker.instances.notificaciones.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.notificaciones.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.notificaciones.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.notificaciones.automatic-transition-from-open-to-half-open-enabled=true