services:
  ms-usuarios:
    build: ./ms-usuarios/ms-usuarios
    ports:
      - "8080:8080"

  ms-inventario:
    build: ./ms-inventario/ms-inventario
    ports:
      - "8081:8081"

  ms-pedidos:
    build: ./ms-pedidos/ms-pedidos
    ports:
      - "8082:8082"

  ms-envios:
    build: ./ms-envios/ms-envios
    ports:
      - "8083:8083"

  ms-notificaciones:
    build: ./ms-notificaciones/ms-notificaciones
    ports:
      - "8084:8084"

  api-gateway:
    build: ./api-gateway/api-gateway
    ports:
      - "9000:9000"
    depends_on:
      - ms-usuarios
      - ms-inventario
      - ms-pedidos
      - ms-envios
      - ms-notificaciones